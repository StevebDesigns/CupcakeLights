<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<title>Cupcake Lights</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#fff;
color:#111;
}

html, body {
  height: 100%;
  width: 100%;
}

h1 {
  padding: 0;
  font-size:40px;
  line-height: .4;
  font-weight: 400;
}

:root {
  --glow1: rgba(0,0,0,0.2);
  --glow2: rgba(0,0,0,0.1);
}

.wrapper{
width:200vw;
height:100vh;
display:flex;
transition:transform .5s cubic-bezier(.22,.9,.24,1);
}

.page {
  align-items: flex-start;
  padding-top: 40px;
}

.page {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 16px;
  overflow-y: auto;
  box-sizing: border-box;
}

.card {
  width: 100%;
  max-width: 340px;
  text-align: center;
  padding: 24px;
  box-sizing: border-box;
   margin-top: 30px;
}

.subtitle{ opacity:0.6; font-size:13px; }

.cupcake{
margin:25px 0;
display:flex;
justify-content:center;
align-items:center;
}

.cupcake svg{
width:170px;
height:170px;
stroke:#111;
stroke-width:32;
fill:none;
stroke-linecap:round;
stroke-linejoin:round;
filter: drop-shadow(0 0 12px rgba(0,0,0,0.2));
transition: filter .3s ease, stroke .3s ease;
}

@keyframes pulse {
  0% { transform: scale(1); filter: drop-shadow(0 0 10px var(--glow1)) drop-shadow(0 0 20px var(--glow2)); }
  50% { transform: scale(1.02); filter: drop-shadow(0 0 18px var(--glow1)) drop-shadow(0 0 45px var(--glow2)); }
  100% { transform: scale(1); filter: drop-shadow(0 0 10px var(--glow1)) drop-shadow(0 0 20px var(--glow2)); }
}

.svgPulse{
animation:pulse 2.6s ease-in-out infinite;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:16px;
background:#f5f5f5;
font-size:14px;
font-weight:600;
cursor:pointer;
}

button:active{ transform:scale(.98); }

input{
width:90%;
padding:14px;
margin-top:14px;
border-radius:14px;
border:1px solid #ddd;
}

button.stop{
background:#111;
color:#fff;
}

button.back{
background:#111;
color:#fff;
}

button.colorBtn {
  transition: transform 0.18s ease, box-shadow 0.25s ease, filter 0.25s ease;
  will-change: transform;
}

/* ACTIVE PRESS FEEL */
button.colorBtn:active {
  transform: scale(0.97);
}

/* HOVER / TOUCH-LIKE GLOW ANIMATION */
button.colorBtn:hover {
  transform: scale(1.03);
}

/* INDIVIDUAL GLOW STATES */
button.warmGlow:hover {
  box-shadow: 0 0 18px rgba(255, 179, 71, 0.55),
              0 0 40px rgba(255, 140, 0, 0.35);
}

button.blueGlow:hover {
  box-shadow: 0 0 18px rgba(122, 187, 255, 0.55),
              0 0 40px rgba(153, 175, 255, 0.35);
}

button.greenGlow:hover {
  box-shadow: 0 0 18px rgba(109, 255, 176, 0.55),
              0 0 40px rgba(0, 255, 140, 0.35);
}

button.pinkGlow:hover {
  box-shadow: 0 0 18px rgba(255, 106, 223, 0.45),
              0 0 40px rgba(255, 0, 180, 0.30);
}

</style>

</head>

<body>

<div id="wrapper" class="wrapper">

<!-- PAGE 1 -->
<div class="page">
<div class="card">

<h1>Cupcake Lights</h1>
<div class="subtitle">Soft glow lighting system</div>

<div class="cupcake">
<svg id="cakeSVG" viewBox="0 -960 960 960">
<path d="M160-80q-17 0-28.5-11.5T120-120v-200q0-33 23.5-56.5T200-400v-160q0-33 23.5-56.5T280-640h160v-58q-18-12-29-29t-11-41q0-15 6-29.5t18-26.5l56-56 56 56q12 12 18 26.5t6 29.5q0 24-11 41t-29 29v58h160q33 0 56.5 23.5T760-560v160q33 0 56.5 23.5T840-320v200q0 17-11.5 28.5T800-80H160Z"/>
</svg>
</div>

<button class="colorBtn warmGlow" onclick="sendMode('thinking'); setGlow('warm')">
☀️ Staring Competition with the Sun
</button>

<button class="colorBtn blueGlow" onclick="sendMode('goodnight'); setGlow('blue')">
🐑 Going to Count Sheep
</button>

<button class="colorBtn greenGlow" onclick="sendMode('home'); setGlow('green')">
🦎 Enemy Alert !
</button>

<button class="colorBtn pinkGlow" onclick="sendMode('miss'); setGlow('pink')">
💜 Illegal Amount of Missing
</button>

<input id="msg" placeholder="Top secret message">

<button onclick="sendMorse()">Send Morse</button>
<button onclick="openHistory()">Morse History</button>

<button class="stop" onclick="sendMode('stop'); setGlow('end')">Stop</button>

</div>
</div>

<!-- PAGE 2 -->
<div class="page">
<div class="card">
<h1>History</h1>
<div id="history"></div>
<button class="back" onclick="goBack()">Back</button>
</div>
</div>

</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>

/* ================= MQTT ================= */

const client = mqtt.connect("wss://b18093b9df75413cb7bbff6e7eb7488a.s1.eu.hivemq.cloud:8884/mqtt", {
  username: "StevebDesigns",
  password: "12345678Ax",
  reconnectPeriod: 2000
});

const TOPIC_MODE = "cup/led/mode";
const TOPIC_TEXT = "cup/led/text";
const TOPIC_HISTORY = "cup/history";

/* ================= UI ================= */

const svg = document.getElementById("cakeSVG");
const wrapper = document.getElementById("wrapper");
const historyDiv = document.getElementById("history");

let page = 0;

/* ================= MQTT ================= */

client.on("connect", () => {
  console.log("MQTT connected");
  client.subscribe(TOPIC_HISTORY);
});

client.on("message", (topic, msg) => {
  if(topic !== TOPIC_HISTORY) return;

  const [text, morse] = msg.toString().split("|");

  historyDiv.innerHTML =
  `<div style="padding:10px;margin:10px;background:#f5f5f5;border-radius:12px">
    <b>${text}</b><br>${morse}
  </div>` + historyDiv.innerHTML;
});

/* ================= MODE ================= */

function sendMode(m){
  client.publish(TOPIC_MODE, m);
}

/* ================= MORSE ================= */

function sendMorse(){

  const t = document.getElementById("msg").value.trim();
  if(!t) return;

  client.publish(TOPIC_TEXT, t);
  client.publish(TOPIC_MODE, "morse");
  client.publish(TOPIC_HISTORY, t + "|sending...");

  document.getElementById("msg").value = "";

  setGlow("white");
}

/* ================= GLOW SYSTEM ================= */

function setGlow(mode){

  svg.classList.remove("svgPulse");

  let glow1 = "rgba(0,0,0,0.2)";
  let glow2 = "rgba(0,0,0,0.1)";
  let stroke = "#111";

  if(mode === "warm"){
    stroke="#fbca37";
    glow1="rgba(255,179,71,0.7)";
    glow2="rgba(255,140,0,0.5)";
    svg.classList.add("svgPulse");
  }

  if(mode === "blue"){
    stroke="#80bbff";
    glow1="rgba(122,187,255,0.7)";
    glow2="rgba(153,175,255,0.5)";
    svg.classList.add("svgPulse");
  }

  if(mode === "green"){
    stroke="#6dffb0";
    glow1="rgba(109,255,176,0.7)";
    glow2="rgba(0,255,140,0.5)";
    svg.classList.add("svgPulse");
  }

  if(mode === "pink"){
    stroke="#ff99e9";
    glow1="rgba(255,106,223,0.6)";
    glow2="rgba(255,0,180,0.4)";
    svg.classList.add("svgPulse");
  }

  if(mode === "white"){
    stroke="#fff";
  }

  if(mode === "end"){
    stroke="#111";
  }

  document.documentElement.style.setProperty("--glow1", glow1);
  document.documentElement.style.setProperty("--glow2", glow2);

  svg.style.stroke = stroke;

  if(!svg.classList.contains("svgPulse")){
    svg.style.filter =
    `drop-shadow(0 0 12px ${glow1})
     drop-shadow(0 0 28px ${glow1})
     drop-shadow(0 0 55px ${glow2})`;
  }
}

/* ================= NAV ================= */

function openHistory(){
  page = 1;
  wrapper.style.transform = "translateX(-100vw)";
}

function goBack(){
  page = 0;
  wrapper.style.transform = "translateX(0vw)";
}

/* ================= SWIPE ================= */

let startX = 0;

document.addEventListener("touchstart", e => startX = e.touches[0].clientX);

document.addEventListener("touchend", e => {
  let diff = startX - e.changedTouches[0].clientX;

  if(diff > 60 && page === 0) openHistory();
  if(diff < -60 && page === 1) goBack();
});

</script>

</body>
</html>
