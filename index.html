<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<title>Cupcake Lights</title>

<style>

/* ================= ORIGINAL STYLING (UNCHANGED) ================= */

body{
margin:0;
overflow-x:hidden;
overflow-y:auto;
-webkit-overflow-scrolling: touch;
height:100vh;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#fff;
color:#111;
}

.wrapper{
width:200vw;
height:100vh;
display:flex;
transition:transform .5s cubic-bezier(.22,.9,.24,1);
}

.page{
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:340px;
text-align:center;
padding:24px;
}

h1{
font-size:31px;
font-weight:600;
margin-bottom:6px;
}

.subtitle{
opacity:0.55;
font-size:13px;
margin-bottom:18px;
}

.cupcake{
display:flex;
justify-content:center;
align-items:center;
margin-bottom:28px;
animation:float 10s ease-in-out infinite;
}

.cupcake svg{
width:170px;
height:170px;
fill:none;
stroke:#111;
stroke-width:32;
stroke-linecap:round;
stroke-linejoin:round;

/* 🔥 ADDED: glow animation support */
filter: drop-shadow(0 0 12px rgba(0,0,0,0));
animation: glowPulse 1.8s ease-in-out infinite;
transition: stroke .45s ease, transform .45s ease;
}

/* 🔥 NEW: pulsing glow animation */
@keyframes glowPulse {
0% {
filter:
drop-shadow(0 0 10px var(--g1))
drop-shadow(0 0 22px var(--g1))
drop-shadow(0 0 40px var(--g2));
}

50% {
filter:
drop-shadow(0 0 18px var(--g1))
drop-shadow(0 0 40px var(--g1))
drop-shadow(0 0 75px var(--g2));
}

100% {
filter:
drop-shadow(0 0 10px var(--g1))
drop-shadow(0 0 22px var(--g1))
drop-shadow(0 0 40px var(--g2));
}
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:16px;
background:#f5f5f5;
font-size:14px;
font-weight:600;
cursor:pointer;
}

button:active{ transform:scale(.98); }

input{
width:90%;
padding:14px;
margin-top:16px;
border-radius:14px;
border:1px solid #ddd;
font-size:14px;
}

.historyCard{
width:340px;
max-height:85vh;
overflow-y:auto;
text-align:center;
padding:24px;
}

.item{
padding:16px;
margin-bottom:12px;
background:#f5f5f5;
border-radius:16px;
text-align:left;
}

.english{
font-weight:600;
margin-bottom:6px;
}

.morse{
font-family:monospace;
opacity:0.7;
word-break:break-word;
}

.backBtn{
margin-top:20px;
width:100%;
padding:14px;
border-radius:16px;
border:none;
background:#111;
color:#fff;
font-weight:600;
}

.stop{
background:#111;
color:#fff;
}

::-webkit-scrollbar{ display:none; }

</style>

</head>

<body>

<div id="wrapper" class="wrapper">

<!-- ================= PAGE 1 ================= -->

<div class="page">

<div class="card">

<h1>Cupcake Lights</h1>
<div class="subtitle">Soft glow lighting system</div>

<div class="cupcake">

<svg id="cakeSVG" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px">
<path d="M160-80q-17 0-28.5-11.5T120-120v-200q0-33 23.5-56.5T200-400v-160q0-33 23.5-56.5T280-640h160v-58q-18-12-29-29t-11-41q0-15 6-29.5t18-26.5l56-56 56 56q12 12 18 26.5t6 29.5q0 24-11 41t-29 29v58h160q33 0 56.5 23.5T760-560v160q33 0 56.5 23.5T840-320v200q0 17-11.5 28.5T800-80H160Z"/>
</svg>

</div>

<button onclick="sendMode('thinking'); setGlow('warm')">
☀️ Staring Competition with the Sun
</button>

<button onclick="sendMode('goodnight'); setGlow('blue')">
🐑 Going to Count Sheep
</button>

<button onclick="sendMode('home'); setGlow('green')">
🦎 Enemy Alert !
</button>

<button onclick="sendMode('miss'); setGlow('pink')">
💜 Illegal Amount of Missing
</button>

<input id="msg" placeholder="Top secret message">

<button onclick="triggerMorseSend()">
Send Morse
</button>

<button onclick="openHistory()">Morse History</button>

<button class="stop" onclick="sendMode('stop'); setGlow('end')">
Stop
</button>

</div>
</div>

<!-- ================= PAGE 2 ================= -->

<div class="page">

<div class="historyCard">

<h1>Morse History</h1>
<div class="subtitle">← swipe back</div>

<div id="historyList"></div>

<button class="backBtn" onclick="goBack()">← Back</button>

</div>

</div>

</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>

/* ================= MQTT (UNCHANGED) ================= */

const MQTT_BROKER = "wss://b18093b9df75413cb7bbff6e7eb7488a.s1.eu.hivemq.cloud:8884/mqtt";

const TOPIC_MODE = "cup/led/mode";
const TOPIC_TEXT = "cup/led/text";
const TOPIC_HISTORY = "cup/history";

const client = mqtt.connect(MQTT_BROKER, {
  username: "StevebDesigns",
  password: "12345678Ax",
  clean: true,
  reconnectPeriod: 2000
});

client.on("connect", () => {
  console.log("MQTT connected");
  client.subscribe(TOPIC_HISTORY);
});

/* ================= UI ================= */

const svg = document.getElementById("cakeSVG");
const wrapper = document.getElementById("wrapper");
const historyList = document.getElementById("historyList");

let page = 0;

/* ================= HISTORY ================= */

client.on("message", (topic, message) => {

  if (topic === TOPIC_HISTORY) {

    let msg = message.toString();
    let parts = msg.split("|");

    let html =
    `<div class='item'>
      <div class='english'>${parts[0]}</div>
      <div class='morse'>${parts[1]}</div>
    </div>`;

    historyList.innerHTML = html + historyList.innerHTML;
  }
});

/* ================= SEND ================= */

function sendMode(mode){
  client.publish(TOPIC_MODE, mode);
}

function sendText(){

  let t = document.getElementById("msg").value.trim();
  if(t === "") return;

  client.publish(TOPIC_TEXT, t);
  client.publish(TOPIC_MODE, "morse");
  client.publish(TOPIC_HISTORY, t + "|Sending Morse...");

  setGlow("morsewhite");

  document.getElementById("msg").value = "";
}

function triggerMorseSend(){
  sendText();
}

/* ================= 🔥 GLOW (NOW PULSING) ================= */

function setGlow(mode){

let stroke = "#111";
let glow1 = "";
let glow2 = "";

if(mode === "warm"){
stroke = "#fbca37";
glow1 = "rgba(255,179,71,0.65)";
glow2 = "rgba(255,140,0,0.6)";
}

if(mode === "blue"){
stroke = "#80bbff";
glow1 = "rgba(122,187,255,0.65)";
glow2 = "rgba(153,175,255,0.6)";
}

if(mode === "green"){
stroke = "#6dffb0";
glow1 = "rgba(109,255,176,0.65)";
glow2 = "rgba(0,255,140,0.6)";
}

if(mode === "pink"){
stroke = "#ff99e9";
glow1 = "rgba(255,106,223,0.45)";
glow2 = "rgba(255,0,180,0.4)";
}

if(mode === "morsewhite"){
stroke = "#ffffff";
glow1 = "rgba(255,255,255,0.9)";
glow2 = "rgba(255,255,255,0.6)";
}

if(mode === "end"){
stroke = "#111";
glow1 = "rgba(255,255,255,0.65)";
glow2 = "rgba(220,220,220,0.6)";
}

svg.style.stroke = stroke;

/* 🔥 NEW: pass glow colors into animation */
svg.style.setProperty("--g1", glow1);
svg.style.setProperty("--g2", glow2);

}

/* ================= NAV ================= */

function openHistory(){
page = 1;
wrapper.style.transform = "translateX(-100vw)";
}

function goBack(){
page = 0;
wrapper.style.transform = "translateX(0vw)";
}

/* ================= SWIPE ================= */

let startX = 0;

document.addEventListener("touchstart", e => {
startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {

let diff = startX - e.changedTouches[0].clientX;

if(diff > 60 && page === 0) openHistory();
if(diff < -60 && page === 1) goBack();

});

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("PWA Service Worker Registered"));
}

</script>

</body>
</html>
